<!DOCTYPE html>

<html>

<head>


<title>Login - Wealth Management Copilot</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body{
        background:#f4f6f9;
    }

    .login-card{
        max-width:500px;
        margin:auto;
        margin-top:80px;
    }

</style>


</head>

<body>

<div class="container">

<div class="card shadow-sm login-card">

    <div class="card-body p-4">

        <div class="text-center">

            <h1>💰</h1>

        </div>

        <h2 class="text-center mb-3">
            Wealth Management Copilot
        </h2>

        <p class="text-center text-muted">
            Sign in to continue
        </p>

        <form method="POST">

            <div class="mb-3">

                <label>Email</label>

                <input
                type="email"
                name="email"
                class="form-control"
                required>

            </div>

            <div class="mb-3">

                <label>Password</label>

                <input
                type="password"
                name="password"
                class="form-control"
                required>

            </div>

            <button
            type="submit"
            class="btn btn-primary w-100">

                Login

            </button>

        </form>

        <div class="text-center mt-3">

            <a href="/register">
                Create Account
            </a>

        </div>

    </div>

</div>

</div>

</body>

</html>
