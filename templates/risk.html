<!DOCTYPE html>
<html>

<head>

<title>Risk Assessment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.card-box{
max-width:900px;
margin:auto;
margin-top:40px;
}

</style>

</head>

<body>

<div class="container">

<div class="card shadow-sm card-box">

<div class="card-body p-4">

<div class="text-center">

<h1>📊</h1>

<h2>Wealth Management Copilot</h2>

<p class="text-muted">
Investor Risk Assessment
</p>

</div>

<form method="POST">

<div class="mb-4">

<h5>1. What is your age group?</h5>

<select name="q1" class="form-control" required>

<option value="1">Above 50</option>
<option value="2">30 - 50</option>
<option value="3">Below 30</option>

</select>

</div>

<div class="mb-4">

<h5>2. Investment Horizon?</h5>

<select name="q2" class="form-control" required>

<option value="1">Less than 2 Years</option>
<option value="2">2 - 5 Years</option>
<option value="3">More than 5 Years</option>

</select>

</div>

<div class="mb-4">

<h5>3. How stable is your income?</h5>

<select name="q3" class="form-control" required>

<option value="1">Unstable</option>
<option value="2">Moderately Stable</option>
<option value="3">Very Stable</option>

</select>

</div>

<div class="mb-4">

<h5>4. Investment Experience?</h5>

<select name="q4" class="form-control" required>

<option value="1">Beginner</option>
<option value="2">Intermediate</option>
<option value="3">Experienced</option>

</select>

</div>

<div class="mb-4">

<h5>5. If markets fall 20%, what will you do?</h5>

<select name="q5" class="form-control" required>

<option value="1">Sell Everything</option>
<option value="2">Hold</option>
<option value="3">Buy More</option>

</select>

</div>

<div class="mb-4">

<h5>6. Expected Returns?</h5>

<select name="q6" class="form-control" required>

<option value="1">Low Risk Low Return</option>
<option value="2">Balanced</option>
<option value="3">High Return High Risk</option>

</select>

</div>

<div class="mb-4">

<h5>7. Emergency Fund Available?</h5>

<select name="q7" class="form-control" required>

<option value="1">No</option>
<option value="2">Partially</option>
<option value="3">Yes</option>

</select>

</div>

<div class="mb-4">

<h5>8. Overall Risk Comfort?</h5>

<select name="q8" class="form-control" required>

<option value="1">Low</option>
<option value="2">Medium</option>
<option value="3">High</option>

</select>

</div>

<button class="btn btn-warning w-100">

Generate Risk Profile

</button>

</form>

<br>

<div class="text-center">

<a href="/dashboard"
class="btn btn-outline-secondary">

Back To Dashboard

</a>

</div>

</div>

</div>

</div>

</body>

</html>
