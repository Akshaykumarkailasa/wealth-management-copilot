<!DOCTYPE html>

<html>

<head>
<title>Add Expense - Wealth Management Copilot</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body{
        background:#f4f6f9;
    }

    .expense-card{
        max-width:700px;
        margin:auto;
        margin-top:40px;
    }

</style>

</head>

<body>

<div class="container">
<div class="card shadow-sm expense-card">

    <div class="card-body p-4">

        <div class="text-center">

            <h1>💰</h1>

        </div>

        <h2 class="text-center">
            Wealth Management Copilot
        </h2>

        <p class="text-center text-muted">
            Add Expense
        </p>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Category
                </label>

                <select
                name="category"
                class="form-select"
                required>

                    <option value="">
                        Select Category
                    </option>

                    <option value="Food">
                        Food
                    </option>

                    <option value="Travel">
                        Travel
                    </option>

                    <option value="Bills">
                        Bills
                    </option>

                    <option value="Shopping">
                        Shopping
                    </option>

                    <option value="Entertainment">
                        Entertainment
                    </option>

                    <option value="Other">
                        Other
                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Amount
                </label>

                <input
                type="number"
                step="0.01"
                name="amount"
                class="form-control"
                required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Expense Date
                </label>

                <input
                type="date"
                name="expense_date"
                class="form-control"
                required>

            </div>

            <button
            type="submit"
            class="btn btn-primary w-100">

                Add Expense

            </button>

        </form>

        <div class="text-center mt-3">

            <a href="/dashboard"
            class="btn btn-outline-secondary">

                Back to Dashboard

            </a>

        </div>

    </div>

</div>

</div>

</body>

</html>
