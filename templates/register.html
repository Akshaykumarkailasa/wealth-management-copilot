<!DOCTYPE html>

<html>

<head>
<title>Register - Wealth Management Copilot</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body{
        background:#f4f6f9;
    }

    .register-card{
        max-width:600px;
        margin:auto;
        margin-top:40px;
        margin-bottom:40px;
    }

</style>


</head>

<body>

<div class="container">


<div class="card shadow-sm register-card">

    <div class="card-body p-4">

        <div class="text-center">

            <h1>💰</h1>

        </div>

        <h2 class="text-center mb-3">
            Wealth Management Copilot
        </h2>

        <p class="text-center text-muted">
            Create your account
        </p>

        <form method="POST">

            <div class="mb-3">

                <label>Name</label>

                <input
                type="text"
                name="name"
                class="form-control"
                required>

            </div>

            <div class="mb-3">

                <label>Email</label>

                <input
                type="email"
                name="email"
                class="form-control"
                required>

            </div>

            <div class="mb-3">

                <label>Password</label>

                <input
                type="password"
                name="password"
                class="form-control"
                required>

            </div>

            <div class="mb-3">

                <label>Age</label>

                <input
                type="number"
                name="age"
                class="form-control"
                required>

            </div>

            <div class="mb-3">

                <label>Monthly Income</label>

                <input
                type="number"
                name="income"
                class="form-control"
                required>

            </div>

            <button
            type="submit"
            class="btn btn-success w-100">

                Register

            </button>

        </form>

        <div class="text-center mt-3">

            <a href="/login">
                Already have an account?
            </a>

        </div>

    </div>

</div>


</div>

</body>

</html>
