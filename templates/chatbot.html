<!DOCTYPE html>

<html>

<head>

<title>AI Financial Advisor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.chat-card{
max-width:1000px;
margin:auto;
margin-top:40px;
}

.answer-box{
background:white;
padding:20px;
border-radius:10px;
border:1px solid #ddd;
}

</style>

</head>

<body>

<div class="container">

<div class="card shadow-sm chat-card">

<div class="card-body p-4">

<div class="text-center">

<h1>🤖</h1>

<h2>Wealth Management Copilot</h2>

<p class="text-muted">
AI Financial Advisor
</p>

</div>

<form method="POST">

<textarea
name="question"
rows="5"
class="form-control"
placeholder="Ask your financial question..."
required></textarea>

<br>

<button
class="btn btn-dark w-100">

Ask AI Advisor

</button>

</form>

{% if answer %}

<hr>

<div class="answer-box">

<h4>AI Response</h4>

<p style="white-space: pre-wrap;">
{{answer}}
</p>

</div>

{% endif %}

<br>

<div class="text-center">

<a href="/dashboard"
class="btn btn-outline-secondary">

Back To Dashboard

</a>

</div>

</div>

</div>

</div>

</body>

</html>
